<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旋转木马</title>
    <style>
        body{
            perspective: 1000px;
        }
        .bbox {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 200px auto;
            
            transform-style: preserve-3d;
            animation:rotate 3s linear infinite;
        }

        @keyframes rotate {
            0% {
                transform: rotateY(0);
            }
            100% {
                transform: rotateY(360deg);
            }
        }



       .img1{
            position: absolute;
            width: 200px;
            height: 200px;
            transform: translateZ(300px);
            background-color: antiquewhite;
            
        }
        .img2{
            position: absolute;
            width: 200px;
            height: 200px;
            transform: rotateY(60deg) translateZ(300px);
            background-color:aqua;
            
        }
        .img3{
            position: absolute;
            width: 200px;
            height: 200px;
            transform: rotateY(120deg) translateZ(300px);
            background-color:aquamarine;
        }
        .img4{
            position: absolute;
            width: 200px;
            height: 200px;
            transform: rotateY(180deg) translateZ(300px);
            background-color: blue;
        }
        .img5{
            position: absolute;
            width: 200px;
            height: 200px;
            transform: rotateY(240deg) translateZ(300px);
            background-color: blueviolet;
        }
        .img6{
            position: absolute;
            width: 200px;
            height: 200px;
            transform: rotateY(300deg) translateZ(300px);
            background-color: brown;
        }

       
    

    </style>
</head>
<body>
    <div class="bbox">
        <div class="img1"></div>
        <div class="img2"></div>
        <div class="img3"></div>
        <div class="img4"></div>
        <div class="img5"></div>
        <div class="img6"></div>
    </div>
</body>
</html>
