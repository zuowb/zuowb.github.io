<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双飞翼&&圣杯&&三栏布局</title>

    <style>
       
        html,
        body,
        .container {
            margin: 0;
            height: 100%;
            
        }

        .container {
            background-color: antiquewhite;
            padding: 0 120px;
            box-sizing: border-box;

        }

        .conlum {
            height: 100%;
            float: left;
            position: relative;
        }

        .middle{
            width: 100%;
            background-color: aqua;
        }
        .left {
            width: 120px;
            background-color: blue;
            margin-left: -100%;
            left: -120px;
        }
        .right {
            width: 120px;
            background-color: blueviolet;
            margin-left: -120px;
            left: 120px;
        }


        .left2 {
            float: left;
            width: 100px;
            height: 100px;
            background-color: black;
        }

        .middle2 {
            width: 100%;
            height: 100px;
            background-color: aqua;
        }
        .right2 {
            float: right;
            width: 100px;
            height: 100px;
            background-color: black;
        }


    </style>
</head>


<body>
    <div class="container">
        <div class="conlum middle">middle</div>
        <div class="conlum left">left</div>
        <div class="conlum right">right</div>
    </div>
    <div class="middle2"></div>
    <div class="left2"></div>
    
    <div class="right2"></div>

    
</div>
</body>
</html>
