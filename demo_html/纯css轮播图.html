<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css轮播图</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .slides {
            position: relative;
                width: 600px;
                height: 280px;
                background-color: #fff;
                overflow: hidden;
        }
        .slide{
            width: inherit;
            height: inherit;
            position: absolute;
            top:0;
            left: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 120px;
            transition: 0.5s;
        }
        .slide:nth-of-type(1){
            
            background-color: red;

        }
        .slide:nth-of-type(2){
            background-color: green;
            left: 100%;
        }
        .slide:nth-of-type(3){
            background-color: blue;
            left:200%
        }
       input[type="radio"]{
           position: relative;
           z-index: 100;
           display: none;
       }
       .controls-visible{
           position: absolute;
           left: 0;
           bottom: 15px;
           width: 100%;
           text-align: center;

       }
       .controls-visible label {
           display: inline-block;
           width: 10px;
           height: 10px;
           border-radius: 50%;
           background-color: #fff;
           margin: 0 3px;
           border: 2px solid #fff;
           
       }

       input[type="radio"]:nth-of-type(1):checked ~ .controls-visible label:nth-of-type(1){
           background-color: #333;
       }

       input[type="radio"]:nth-of-type(2):checked ~ .controls-visible label:nth-of-type(2){
           background-color: #333;
       }
       input[type="radio"]:nth-of-type(3):checked ~ .controls-visible label:nth-of-type(3){
           background-color: #333;
       }

       input[type="radio"]:nth-of-type(1):checked ~ .slide{
           transform: translateX(0);
       }
       input[type="radio"]:nth-of-type(2):checked ~ .slide{
        transform: translateX(-100%);
       }
       input[type="radio"]:nth-of-type(3):checked ~ .slide{
        transform: translateX(-200%);
       }

    </style>

</head>
<body>
    
    <ul class="slides">
        <input type="radio" id="control-1" name="control" checked>
        <input type="radio" id="control-2" name="control">
        <input type="radio" id="control-3" name="control">
        <li class="slide">1</li>
        <li class="slide">2</li>
        <li class="slide">3</li>
        <div class="controls-visible">
            <label for="control-1"></label>
            <label for="control-2"></label>
            <label for="control-3"></label>
        </div>

    </ul>


</body>
</html>
