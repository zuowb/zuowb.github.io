        .kon {
            left: calc(100%-450px);
            top: calc(100%-311px);
            position: relative;
            width: 450px;
            height: 311px;
            
            overflow: hidden;
        }
        .kon img {
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
        }
        .kon .img1{
            position: absolute;
            top: 0;
            left: 100%;
            background: url('kon_girl.png') no-repeat;
            width: 100%;
            height: 100%;
            animation: kon1 5s linear  infinite;
        }
        @keyframes kon1{
            0%{left:100%;}
            100%{left:-100%;}
        }
        .kon .img2{
            position: absolute;
            top: 0;
            left: 100%;
            background: url('kon_girl.png') no-repeat;
            width: 100%;
            height: 100%;
            animation: kon2 5s linear 2.5s infinite;
        }
        @keyframes kon2{
            0%{left:100%;}
            100%{left:-100%;}
        }

        
    </style>
