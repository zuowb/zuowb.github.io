<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="index.css">
    <script>
        function exchange() {
            var name = document.getElementById('input').getAttribute('name');
            var op = (name == 'word') ? 0 : 1;
            var search = (name == 'word') ? "https://www.google.com/search?q" : "https://www.baidu.com/s?word";
            var nname = (name == 'word') ? 'search' : 'word';
            document.getElementById('input').name = nname;
            document.getElementById('submit').action = search;
            document.getElementById('baidu').style.opacity = op;
            document.getElementById('google').style.opacity = (op + 1) % 2;
        }

        // function last() {
        //     var n = new Date();
        //     n = n.getSeconds();
        //     n = n % 10;
        //     var name = "bg/" + n + ".png";
        //     document.body.style.backgroundImage = 'url("' + name + '")';
        // }
        function deadline() {

            var CET = new Date('2022','4','22','15','0','0');
            
            var n = (CET-new Date())/1000;

            var sec = Math.floor(n%60);
            var min = Math.floor(n/60%60);
            var hour = Math.floor(n/60/60%24);
            var day = Math.floor(n/60/60/24);

            var text = day+' 天 '+hour +' 小时 '+ min +' 分钟 '+ sec +' 秒！' ;

            document.getElementById('deadline').innerHTML=text;

        }
    </script>
</head>

<body onload="deadline()">

                <p>距离六级口语还有：</p>
                <span id="deadline"></span>
            </div>
        </div>
        <div id="search-box">
            <form id="submit" action="https://www.baidu.com/s" method="GET" target="_blank">
                <input id="input" placeholder="search" type="text" name="word" autocomplete="off">
                <img src="icon/baidu.png" id="baidu" alt="" style="opacity: 1;">
                <img src="icon/circle.png" id="switch" alt="" onclick="exchange()">
                <img src="icon/google.png" id="google" alt="" style="opacity: 0;">
            </form>
